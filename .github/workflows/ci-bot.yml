name: CI (Bot PRs)

# Runs CI on PRs created by agentic workflows.
# GitHub does not trigger pull_request workflows for PRs created by
# github-actions[bot] using the default GITHUB_TOKEN, so this workflow
# listens for agentic workflow completions and runs the same checks.

on:
  workflow_run:
    workflows: ["Code Simplifier", "Daily Documentation Updater"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  find-pr:
    name: Find Bot PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.find.outputs.pr_number }}
      head_ref: ${{ steps.find.outputs.head_ref }}
      head_sha: ${{ steps.find.outputs.head_sha }}
    steps:
      - name: Find PR created by workflow
        id: find
        uses: actions/github-script@v8
        with:
          script: |
            // Map triggering workflow to the title prefix it uses
            const prefixMap = {
              "Code Simplifier": "[code-simplifier]",
              "Daily Documentation Updater": "[docs]",
            };
            const workflowName = context.payload.workflow_run?.name || "";
            const expectedPrefix = prefixMap[workflowName];
            if (!expectedPrefix) {
              core.info(`Unknown workflow "${workflowName}" — skipping CI.`);
              return;
            }

            const runCreatedAt = new Date(
              context.payload.workflow_run?.created_at || Date.now()
            );

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              sort: "created",
              direction: "desc",
              per_page: 10,
            });

            const botPr = prs.find(
              (pr) =>
                pr.user.login === "github-actions[bot]" &&
                pr.title.startsWith(expectedPrefix) &&
                new Date(pr.created_at) > new Date(runCreatedAt - 3600000)
            );

            if (botPr) {
              core.setOutput("pr_number", botPr.number);
              core.setOutput("head_ref", botPr.head.ref);
              core.setOutput("head_sha", botPr.head.sha);
              core.info(`Found bot PR #${botPr.number} (${expectedPrefix}) on branch ${botPr.head.ref}`);
            } else {
              core.info(`No recent bot PR with prefix "${expectedPrefix}" found — skipping CI.`);
            }

  stylua:
    name: Stylua
    needs: find-pr
    if: needs.find-pr.outputs.pr_number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-pr.outputs.head_ref }}
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ spec/ plugin/

  luacheck:
    name: Luacheck
    needs: find-pr
    if: needs.find-pr.outputs.pr_number
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-pr.outputs.head_ref }}
      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck
      - name: Run luacheck
        run: luacheck lua/ spec/ --globals vim

  tests:
    name: Tests
    needs: find-pr
    if: needs.find-pr.outputs.pr_number
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-pr.outputs.head_ref }}
      - uses: folke/github/neovim@main
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Run tests
        run: ./scripts/test

  report-status:
    name: Report Status
    needs: [find-pr, stylua, luacheck, tests]
    if: always() && needs.find-pr.outputs.head_sha
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Determine overall result
        id: result
        run: |
          if [[ "${{ needs.stylua.result }}" == "success" && \
                "${{ needs.luacheck.result }}" == "success" && \
                "${{ needs.tests.result }}" == "success" ]]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=All CI checks passed" >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=CI checks failed (stylua=${{ needs.stylua.result }}, luacheck=${{ needs.luacheck.result }}, tests=${{ needs.tests.result }})" >> "$GITHUB_OUTPUT"
          fi
      - name: Set commit status on PR
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: "${{ needs.find-pr.outputs.head_sha }}",
              state: "${{ steps.result.outputs.state }}",
              description: "${{ steps.result.outputs.description }}",
              context: "CI (Bot PRs)",
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
